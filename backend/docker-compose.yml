services:
  gateway-service:
    build:
      context: .
      dockerfile: ./microservices/gateway-service/Dockerfile
    container_name: gateway_service
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_HOSTPORT: ${AUTH_SERVICE_HOSTPORT:-auth-service:8000}
      DOCS_SERVICE_HOSTPORT: ${DOCS_SERVICE_HOSTPORT:-docs-service:8000}
      WS_SERVICE_HOSTPORT: ${WS_SERVICE_HOSTPORT:-websocket-service:8000}
      PREDICTION_SERVICE_HOSTPORT: ${PREDICTION_SERVICE_HOSTPORT:-prediction-service:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      - auth-service
      - docs-service
      - websocket-service
      - prediction-service

  auth-service:
    build:
      context: .
      dockerfile: ./microservices/auth-service/Dockerfile
    container_name: auth_service
    ports:
      - "8001:8000"
    env_file:
      - ./.env

  docs-service:
    build:
      context: .
      dockerfile: ./microservices/docs-service/Dockerfile
    container_name: docs_service
    ports:
      - "8002:8000"
    env_file:
      - ./.env

  websocket-service:
    build:
      context: .
      dockerfile: ./microservices/websocket-service/Dockerfile
    container_name: websocket_service
    ports:
      - "8003:8000"
    env_file:
      - ./.env

  prediction-service:
    build:
      context: .
      dockerfile: ./microservices/prediction-service/Dockerfile
    container_name: prediction_service
    ports:
      - "8004:8000"
    env_file:
      - ./.env
