databases:
  - name: docs-db
    plan: starter

services:
  - type: web
    name: auth-service
    runtime: docker
    repo: https://github.com/devanshu2607/Your-Docs
    branch: master
    dockerContext: backend
    dockerfilePath: backend/microservices/auth-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SQL_DATABASE_URL
        fromDatabase:
          name: docs-db
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: web
    name: docs-service
    runtime: docker
    repo: https://github.com/devanshu2607/Your-Docs
    branch: master
    dockerContext: backend
    dockerfilePath: backend/microservices/docs-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SQL_DATABASE_URL
        fromDatabase:
          name: docs-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://docs-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://docs-frontend.onrender.com,http://localhost:3000

  - type: web
    name: websocket-service
    runtime: docker
    repo: https://github.com/devanshu2607/Your-Docs
    branch: master
    dockerContext: backend
    dockerfilePath: backend/microservices/websocket-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SQL_DATABASE_URL
        fromDatabase:
          name: docs-db
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: web
    name: prediction-service
    runtime: docker
    repo: https://github.com/devanshu2607/Your-Docs
    branch: master
    dockerContext: backend
    dockerfilePath: backend/microservices/prediction-service/Dockerfile
    healthCheckPath: /health

  - type: web
    name: docs-backend
    runtime: docker
    repo: https://github.com/devanshu2607/Your-Docs
    branch: master
    dockerContext: backend
    dockerfilePath: backend/microservices/gateway-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AUTH_SERVICE_HOSTPORT
        fromService:
          name: auth-service
          type: web
          property: hostport
      - key: DOCS_SERVICE_HOSTPORT
        fromService:
          name: docs-service
          type: web
          property: hostport
      - key: WS_SERVICE_HOSTPORT
        fromService:
          name: websocket-service
          type: web
          property: hostport
      - key: PREDICTION_SERVICE_HOSTPORT
        fromService:
          name: prediction-service
          type: web
          property: hostport
      - key: FRONTEND_URL
        value: https://docs-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://docs-frontend.onrender.com,http://localhost:3000

  - type: web
    name: docs-frontend
    runtime: static
    repo: https://github.com/devanshu2607/Your-Docs
    branch: master
    rootDir: docs-react
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://docs-backend.onrender.com
      - key: REACT_APP_WS_URL
        value: wss://docs-backend.onrender.com
