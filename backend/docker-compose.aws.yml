services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-your_docs}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-your_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway-service:
    build:
      context: .
      dockerfile: ./microservices/gateway-service/Dockerfile
    container_name: gateway_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./.env.aws
    environment:
      AUTH_SERVICE_HOSTPORT: ${AUTH_SERVICE_HOSTPORT:-auth-service:8000}
      DOCS_SERVICE_HOSTPORT: ${DOCS_SERVICE_HOSTPORT:-docs-service:8000}
      WS_SERVICE_HOSTPORT: ${WS_SERVICE_HOSTPORT:-websocket-service:8000}
      PREDICTION_SERVICE_HOSTPORT: ${PREDICTION_SERVICE_HOSTPORT:-prediction-service:8000}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      auth-service:
        condition: service_healthy
      docs-service:
        condition: service_healthy
      websocket-service:
        condition: service_healthy
      prediction-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  auth-service:
    build:
      context: .
      dockerfile: ./microservices/auth-service/Dockerfile
    container_name: auth_service
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./.env.aws
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  docs-service:
    build:
      context: .
      dockerfile: ./microservices/docs-service/Dockerfile
    container_name: docs_service
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./.env.aws
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  websocket-service:
    build:
      context: .
      dockerfile: ./microservices/websocket-service/Dockerfile
    container_name: websocket_service
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./.env.aws
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  prediction-service:
    build:
      context: .
      dockerfile: ./microservices/prediction-service/Dockerfile
    container_name: prediction_service
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./.env.aws
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
