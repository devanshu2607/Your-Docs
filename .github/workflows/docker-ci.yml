name: Docker CI

on:
  push:
    paths:
      - "backend/**"
      - "docs-react/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "docs-react/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t yourdocs-backend ./backend

      - name: Build frontend image
        run: docker build -t yourdocs-frontend ./docs-react
