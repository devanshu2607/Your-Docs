services:
  - type: web
    name: docs-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SQL_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://docs-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://docs-frontend.onrender.com,http://localhost:3000

  - type: web
    name: docs-frontend
    runtime: static
    rootDir: docs-react
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://docs-backend.onrender.com
      - key: REACT_APP_WS_URL
        value: wss://docs-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
